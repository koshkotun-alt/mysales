<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Мои продажи</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h2 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-color: #fff;
        }

        th {
            background-color: #007bff;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .btn {
            padding: 6px 12px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #c82333;
        }

        .add-sale-btn {
            padding: 10px 15px;
            margin-bottom: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }

        .add-sale-btn:hover {
            background-color: #218838;
        }

        /* Центрирование блока */
        .container {
            max-width: 1000px;
            margin: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Мои продажи</h2>
    <a href="/add_sale" class="add-sale-btn">Добавить продажу</a>
	<a href="/index" style="display:inline-block; margin-bottom:20px;">⬅️ На главную</a>
    <table>
        <thead>
            <tr>
                <th>Товар</th>
                <th>Количество</th>
                <th>Цена</th>
                <th>Дата</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
        {{if .Sales}}
            {{range .Sales}}
            <tr>
                <td>{{.Product}}</td>
                <td>{{.Quantity}}</td>
                <td>{{printf "%.2f" .Price}}</td>
                <td>{{.SaleDate.Format "02.01.2006 15:04"}}</td>
                <td>
                    <form method="GET" action="/delete_sale" style="display:inline;">
                        <input type="hidden" name="id" value="{{.ID}}">
                        <button type="submit" class="btn">Удалить</button>
                    </form>
                </td>
            </tr>
            {{end}}
        {{else}}
            <tr>
                <td colspan="5" style="text-align:center;">Нет продаж</td>
            </tr>
        {{end}}
        </tbody>
    </table>
</div>
</body>
</html>
